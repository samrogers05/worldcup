<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 105 68" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Alternating mowed-lawn grass stripes -->
    <pattern id="g" x="0" y="0" width="10.5" height="68" patternUnits="userSpaceOnUse">
      <rect width="5.25" height="68" fill="#0b1e0b"/>
      <rect x="5.25" width="5.25" height="68" fill="#0d220d"/>
    </pattern>
  </defs>

  <!-- Base pitch green -->
  <rect width="105" height="68" fill="#0a1a0a"/>
  <!-- Grass stripe overlay -->
  <rect width="105" height="68" fill="url(#g)" opacity="0.7"/>

  <!-- Pitch markings - all lines semi-transparent white -->
  <g fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.45">
    <!-- Outer boundary -->
    <rect x="2" y="2" width="101" height="64" rx="0.2"/>
    <!-- Halfway line -->
    <line x1="52.5" y1="2" x2="52.5" y2="66"/>
    <!-- Centre circle -->
    <circle cx="52.5" cy="34" r="9.15"/>
    <!-- Left penalty area -->
    <rect x="2" y="13.84" width="16.5" height="40.32"/>
    <!-- Right penalty area -->
    <rect x="86.5" y="13.84" width="16.5" height="40.32"/>
    <!-- Left 6-yard box -->
    <rect x="2" y="24.84" width="5.5" height="18.32"/>
    <!-- Right 6-yard box -->
    <rect x="97.5" y="24.84" width="5.5" height="18.32"/>
    <!-- Left goal -->
    <rect x="0" y="29.34" width="2" height="9.32"/>
    <!-- Right goal -->
    <rect x="103" y="29.34" width="2" height="9.32"/>
    <!-- Left penalty arc (D) — only portion outside penalty area -->
    <path d="M 16.5 26.9 A 9.15 9.15 0 0 0 16.5 41.1" stroke-dasharray="2 1"/>
    <!-- Right penalty arc (D) -->
    <path d="M 88.5 41.1 A 9.15 9.15 0 0 0 88.5 26.9" stroke-dasharray="2 1"/>
    <!-- Corner arcs -->
    <path d="M 2 5 A 3 3 0 0 0 5 2"/>
    <path d="M 100 2 A 3 3 0 0 0 103 5"/>
    <path d="M 103 63 A 3 3 0 0 0 100 66"/>
    <path d="M 5 66 A 3 3 0 0 0 2 63"/>
  </g>

  <!-- Spots (centre, penalties) -->
  <circle cx="52.5" cy="34" r="0.55" fill="rgba(255,255,255,0.25)"/>
  <circle cx="13"   cy="34" r="0.55" fill="rgba(255,255,255,0.25)"/>
  <circle cx="92"   cy="34" r="0.55" fill="rgba(255,255,255,0.25)"/>
</svg>
